###################
### KEYBINDINGS ###
###################

source = ~/.config/hypr/config/variables.conf
source = ~/.cache/wal/colors-hyprland.conf

##################
## Applications ##
##################

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, R, exec, pkill $menu || $menu
bind = $mainMod, p, exec, waypaper --folder ~/Pictures/wallpapers
bind = $mainMod, X, exec, $textedit
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, C, exec, pavucontrol
bind = $mainMod, M, exec, foot -e "kew"

#############
## Windows ##
#############

bind = $mainMod, Q, killactive,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, T, togglefloating
bind = $mainMod SHIFT, T, workspaceopt, allfloat
bind = $mainMod, J, togglesplit
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod SHIFT, right, resizeactive, 100 0
bind = $mainMod SHIFT, left, resizeactive, -100 0
bind = $mainMod SHIFT, down, resizeactive, 0 100
bind = $mainMod SHIFT, up, resizeactive, 0 -100
bind = $mainMod, G, togglegroup
bind = $mainMod, K, swapsplit
bind = $mainMod ALT, left, swapwindow, l
bind = $mainMod ALT, right, swapwindow, r
bind = $mainMod ALT, up, swapwindow, u
bind = $mainMod ALT, down, swapwindow, d

#################
## Screenshots ##
#################

bind = $mainMod, PRINT, exec, hyprshot -m output               #screenshot selected screen.
bind = $mainMod SHIFT, PRINT, exec, hyprshot -m region         #screenshot selected region.
bind = SHIFT, PRINT, exec, hyprshot -m window                  #screenshot whole window

################
## Workspaces ##
################

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

###############################
##  Workspace Notifications  ##
###############################
bind = $mainMod, 1, exec, hyprctl notify -1 1000 "$color11"  "fontsize:10 HOME"
bind = $mainMod, 2, exec, hyprctl notify -1 1000 "$color11"  "fontsize:10 BAR"
bind = $mainMod, 3, exec, hyprctl notify -1 1000 "$color11"  "fontsize:10 TRACKS"
bind = $mainMod, 4, exec, hyprctl notify -1 1000 "$color11"  "fontsize:10 THE ZONE 01"
bind = $mainMod, 5, exec, hyprctl notify -1 1000 "$color11"  "fontsize:10 THE ZONE 02"
bind = $mainMod, 6, exec, hyprctl notify -1 1000 "$color11"  "fontsize:10 THE ZONE 03"
bind = $mainMod, 7, exec, hyprctl notify -1 1000 "$color11"  "fontsize:10 THE ZONE 04"
bind = $mainMod, 8, exec, hyprctl notify -1 1000 "$color11"  "fontsize:10 THE ZONE 05"
bind = $mainMod, 9, exec, hyprctl notify -1 1000 "$color11"  "fontsize:10 THE ZONE 06"
bind = $mainMod, 0, exec, hyprctl notify -1 1000 "$color11" "fontsize:10 THE ROOM"


############
## Volume ##
############
binde =, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%+
binde =, XF86AudioLowerVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%-
bind =, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle 

#######################
## Brightness & Temp ##
#######################
bind = ,XF86Tools, exec, hyprctl hyprsunset gamma -10
bind = ,XF86Launch5, exec, hyprctl hyprsunset gamma +10
bind = ,XF86Launch6, exec, hyprctl hyprsunset temperature 2500
bind = ,XF86Launch7, exec, hyprctl hyprsunset temperature 6500

##########
## Time ##
#########

bind = $mainMod, O, exec, hyprctl notify -1 1000 "$color11" "fontsize:10 $current_time"
