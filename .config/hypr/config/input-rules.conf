###################
### INPUT-RULES ###
###################

##############
## Keyboard ##
############## 

input {
    kb_layout = gb
    kb_variant = qwerty
    kb_model = 
    kb_options = fkeys:basic_13-24                                          
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

###########
## Mouse ##
###########

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
