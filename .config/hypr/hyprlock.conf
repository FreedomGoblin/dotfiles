#################
##  HYPERLOCK  ##
#################

source = ~/.config/hypr/config/variables.conf
source = ~/.cache/wal/colors-hyprland.conf

#GENERAL SETTINGS
$font-family = JetBrains Mono
$font-large = 55
$font-medium = 35
$font-eh = 28
$font-small = 24
$input-field-width = 350
$input-field-height = 60
$input-dots-size = 0.1
$input-dots-spacing = 0.35
$input-fade-on-empty = false
$input-rounding = -1

##################
##  BACKGROUND  ##
##################
background {
    monitor =
    path = $wallpaper
    blur_passess = 2
    contrast = 1
    brightness = 0.5
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

###############
##  GENERAL  ##
###############
general {
    no_fade_in = false
    no_fade_out = false
    hide_cursor = false
    grace = 30
    disable_loading_bar = true
}

###################
##  INPUT FIELD  ##
###################
input-field {
    monitor = DP-2
    size = $input-field-width, $input-field-height
    outline_thickness = 2
    dots_size = $input-dots-size
    dots_spacing = $input-dots-spacing
    dots_center = true
    outer_color = $foreground
    inner_color = rgba(0, 0, 0, 0.2)
    font_color = $grey
    fade_on_empty = $input-fade-on-empty
    rounding = $input-rounding
    check_color = $color11
    placeholder_text = <i><span foreground="##cdd6f4">Input Password...</span></i>
    hide_input = false
    position = 0, -350
    halign = center
    valign = center
}

############
##  DATE  ##
############
label {
    monitor =HDMI-A-1
    text = cmd[update:1000] echo "$(date +"%A, %B, %d")"
    color = $grey
    font_size = $font-small
    font_family = JetBrains Mono Extrabold
    position = 500, 250
    halign = center
    valign = center
}

############
##  TIME  ##
############
label {
    monitor =HDMI-A-1 
    text = cmd[update:1000] echo "$(date +"%I.%M")"
    color = $grey
    font_size = $font-eh
    font_family = JetBrains Mono 
    font_style = italic
    position = 608, 210
    halign = center
    valign = center
}

#######################
##  PROFILE PICTURE  ##
#######################
image {
    monitor :DP-2
    path = $profile-picture-path
    size = 100
    border_size = 2
    border_color = $grey
    position = 0, -100
    halign = center
    valign = center
}

###########################
##  DESKTOP ENVIRONMENT  ##
###########################
image {
    monitor =DP-2
    path = $desktop-logo-path
    size = 75
    border_size = 2
    border_color = $grey
    position = -50, 50
    halign = right
    valign = bottom
}
