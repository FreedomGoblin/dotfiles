#########################
## drift configuration ##
#########################

[idle]
timeout = 60                #Seconds of inactivity before drift activates (standalone mode).

[engine]
fps           = 30          #target frames per second
cycle_seconds = 60          #seconds per scene, 0 = stay on one scene
scenes        = "waveform"  #comma-separated list or "all"
theme         = "gruvbox"   #cosmic | nord | dracula | catppuccin | gruvbox | forest | mono
shuffle       = true        #randomise scene order

[scene.constellation]
star_count      = 80
connect_radius  = 0.18      #fraction of screen diagonal
twinkle         = true
max_connections = 4         #per star

[scene.rain]
charset = "ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉ0123456789"
density = 0.4
speed   = 1.0

[scene.particles]
count    = 120
gravity  = 0.0
friction = 0.98

[scene.waveform]
layers    = 3
amplitude = 0.70
speed     = 1.0
