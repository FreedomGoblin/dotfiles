##########
## BTOP ##
##########

# Aesthetics #
color_theme = "~/.config/btop/themes/btopcustom.theme"
theme_background = false                                                                                      #false to use terminal background
truecolor = true                                                                                              #use 24-bit true colour
force_tty = false                                                                                             #force 16-color mode and TTY theme#
presets = "cpu:1:default,proc:0:default cpu:0:default,mem:0:default,net:0:default cpu:0:block,net:0:tty"      #0 or 1 for each box for alternate box layouts
rounded_corners = true                                                                                        #ignored if TTY is enabled
terminal_sync = true                                                                                          #synchronised output (reduces flicker on some terminals)
proc_colors = true                                                                                            #Use the cpu graph colors in the process list.
shown_boxes = "cpu net mem proc"                                                                              #set boxes to show: "cpu","mem","net","proc","gpu0-5"
proc_gradient = true                                                                                          #colour gradient in the process list.
background_update = true                                                                                      #update main ui in background when menus are showing

# Symbols #                                                                                                   #
graph_symbol = "braille"                                                                                      #
graph_symbol_cpu = "default"                                                                                  #
graph_symbol_gpu = "default"                                                                                  #options: 'default', "braille", "block", or "tty"
graph_symbol_mem = "default"                                                                                  #
graph_symbol_net = "default"                                                                                  #
graph_symbol_proc = "default"                                                                                 #

# Input #
vim_keys = true                                                                                               #use vim-keys (h,j,k,l,g,)

# Timing #
update_ms = 2000                                                                                              #update time 2000ms or above please.
clock_format = "%X"                                                                                           #clock at top of screen (empty to disable)
show_uptime = true                                                                                            #show system uptime

# CPU #
proc_per_core = true                                                                                          #usage per core or total usage
proc_mem_bytes = true                                                                                         #Show process memory as bytes instead of percent.
proc_cpu_graphs = true                                                                                        #cpu graph for each process.
proc_info_smaps = false                                                                                       #Use /proc/[pid]/smaps for the process info box (very slow)
proc_filter_kernel = false                                                                                    #Filter processes tied to the Linux kernel.
proc_tree = false                                                                                             #Format processes as a tree
proc_aggregate = false                                                                                        #in tree-view, accumulate child process resources in the parent process.
proc_sorting = "cpu lazy"                                                                                     #"pid","program","arguments","threads","user","memory","cpu lazy","cpu direct"
proc_reversed = false                                                                                         #reverse sorting to Low -> High
proc_left = false                                                                                             #Show proc box on left
keep_dead_proc_usage = false                                                                                  #preserve process data on pause

cpu_graph_upper = "total"                                                                                     #sets the CPU stat shown in upper half of the CPU graph
cpu_graph_lower = "total"                                                                                     #sets the CPU stat shown in lower half of the CPU graph                                                                                                                                                                                                                                                                                                                                                      #show cpu temperature.cpu_sensor = "Auto"                                                                                           #which sensor to use for cpu temperature
cpu_single_graph = false                                                                                      #disable lower CPU graph.
cpu_invert_lower = true                                                                                       #Invert the lower CPU graph
cpu_bottom = false                                                                                            #show cpu box at bottom of screen

show_coretemp = true                                                                                          #show temperatures for cpu cores
cpu_core_map = ""                                                                                             #set custom mapping between core and coretemp
temp_scale = "celsius"                                                                                        #"celsius", "fahrenheit", "kelvin" and "rankine"
check_temp = true

show_cpu_freq = true                                                                                          #show CPU frequency.
freq_mode = "first"                                                                                           #how to calculate CPU frequency, "first", "range", "lowest", "highest" and "average"
base_10_sizes = false                                                                                         #Use base 9 for bits/bytes
show_cpu_watts = true                                                                                         #show CPU power consumption in watts.

custom_cpu_name = ""                                                                                          #custom cpu model, empty string to disable.

#######
# RAM #
#######
mem_graphs = true                                                                                             #show graphs instead of meters for memory values.
mem_below_net = false                                                                                         #mem box below net box

# Disks #
disks_filter = ""                                                                                             #filter shown disks, should be full path of a mountpoint
zfs_arc_cached = true                                                                                         #count ZFS ARC in cached and available memory.
show_swap = true                                                                                              #swap memory should be shown in memory box.
swap_disk = true                                                                                              #swap as a disk, ignores show_swap value above
show_disks = true                                                                                             #mem box should also show disk info.
only_physical = true                                                                                          #filter out non physical disks
use_fstab = true                                                                                              #read disks list from /etc/fstab.
zfs_hide_datasets = false                                                                                     #only show ZFS pools
disk_free_priv = false                                                                                        #show available disk space for privileged users
show_io_stat = true                                                                                           #disk busy time shown in regular disk usage view.
io_mode = false                                                                                               #show big graphs for disk read/write speeds.
io_graph_combined = false                                                                                     #combine read/write io graphs in io mode
io_graph_speeds = ""                                                                                          #top speed for the io graphs in MiB/s (100 by default), use format "mountpoint:speed" separate disks with whitespace " ".

# Network #
net_download = 100                                                                                            #fixed values for network dl graphs in Mebibits
net_upload = 100                                                                                              #fixed values for network ul graphs in Mebibits
net_auto = true                                                                                               #use network graphs auto rescaling mode, rescales to 10 Kibibytes
net_sync = false                                                                                              #sync the auto scaling for download and upload to whichever is currently highest
net_iface = ""                                                                                                #start with Network Interface specified here

base_10_bitrate = "False"                                                                                     #"True" = bitrates in base 10 (Kbps, Mbps). "False" = binary sizes (Kibps, Mibps, etc.)

# battery #
show_battery = false                                                                                          #show battery stats in top right
selected_battery = "Auto"                                                                                     #which battery to use
show_battery_watts = false                                                                                    #show power stats of battery

# Log #
log_level = "WARNING"                                                                                         #loglevel for "~/.local/state/btop.log" "ERROR" "WARNING" "INFO" "DEBUG"

# GPU #
nvml_measure_pcie_speeds = true                                                                               #measure PCIe throughput on NVIDIA cards
rsmi_measure_pcie_speeds = true                                                                               #measure PCIe throughput on AMD cards
gpu_mirror_graph = true                                                                                       #horizontally mirror the GPU graph

show_gpu_info = "Auto"                                                                                        #gpu info shown in the cpu box.("Auto", "On", "Off")
shown_gpus = "nvidia amd intel"                                                                               #which GPU vendors to show

custom_gpu_name0 = ""                                                                                         #custom gpu0 model name
custom_gpu_name1 = ""                                                                                         #custom gpu1 model name
custom_gpu_name2 = ""                                                                                         #custom gpu2 model name
custom_gpu_name3 = ""                                                                                         #custom gpu3 model name
custom_gpu_name4 = ""                                                                                         #custom gpu4 model name
custom_gpu_name5 = ""                                                                                         #custom gpu5 model name

# Autosave #
save_config_on_exit = false                                                                                   #save current settings to config file on exit.

